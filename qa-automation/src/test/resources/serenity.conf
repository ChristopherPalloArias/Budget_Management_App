# ══════════════════════════════════════════════════════════════════════════════
#  Serenity BDD Configuration — Budget Management App
#  Chrome (Modo Visible) — Para observar la ejecución en pantalla
# ══════════════════════════════════════════════════════════════════════════════

# URL base por defecto
webdriver.base.url = "http://localhost:3000"

# ─── WebDriver Configuration (Chrome — Modo Visible) ────────────────────────
webdriver {
  driver = chrome
  autodownload = true

  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true

    "goog:chromeOptions" {
      args = [
        "start-maximized",
        "test-type",
        "no-sandbox",
        "ignore-certificate-errors",
        "--remote-allow-origins=*",
        "--disable-infobars",
        "--disable-extensions"
      ]
    }
  }

  timeouts {
    implicitlywait = 5000
    fluentwait = 10000
  }
}

# ─── Headless Mode DESACTIVADO — El navegador se abre en pantalla ───────────
headless.mode = false

# ─── Serenity Project Metadata ──────────────────────────────────────────────
serenity {
  project.name = "Budget Management App — QA Automation"
  tag.failures = "true"
  take.screenshots = FOR_FAILURES
  logging = NORMAL

  report {
    accessibility = false
    show.manual.tests = false
    show.releases = false
  }
}

# ─── Environment-Specific Base URLs ─────────────────────────────────────────
environments {
  default {
    auth.base.url        = "http://localhost:8083/api/v1"
    transaction.base.url = "http://localhost:8081/api/v1"
    report.base.url      = "http://localhost:8082/api/v1"
    webdriver.base.url   = "http://localhost:3000"
  }

  staging {
    auth.base.url        = "https://staging-api.budgetapp.com/api/v1"
    transaction.base.url = "https://staging-api.budgetapp.com/api/v1"
    report.base.url      = "https://staging-api.budgetapp.com/api/v1"
    webdriver.base.url   = "https://staging.budgetapp.com"
  }

  production {
    auth.base.url        = "https://api.budgetapp.com/api/v1"
    transaction.base.url = "https://api.budgetapp.com/api/v1"
    report.base.url      = "https://api.budgetapp.com/api/v1"
    webdriver.base.url   = "https://budgetapp.com"
  }
}

# ─── REST API Configuration ─────────────────────────────────────────────────
restapi {
  content.type = "application/json"
  connect.timeout = 10000
  read.timeout = 30000
}