# ══════════════════════════════════════════════════════════════════════════════
#  Serenity Properties — Report Output Configuration
# ══════════════════════════════════════════════════════════════════════════════
# Default output directory (overridden per-task via systemProperty in build.gradle)
serenity.outputDirectory=target/site/serenity

# Performance: compress report filenames and limit REST response logging
serenity.compress.filenames=true
serenity.logging=QUIET
